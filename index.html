<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>L'Oréal Smart Routine Advisor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      color: #111;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      text-align: center;
      padding: 18px;
      font-weight: bold;
      letter-spacing: 2px;
      border-bottom: 1px solid #ececec;
      background: #fff;
    }

    .chips {
      display: flex;
      gap: 10px;
      padding: 12px;
      overflow-x: auto;
      border-bottom: 1px solid #f0f0f0;
      background: #fff;
    }

    .chip {
      padding: 8px 14px;
      border: 1px solid #ddd;
      border-radius: 999px;
      cursor: pointer;
      white-space: nowrap;
      background: #fafafa;
      font-size: 14px;
      transition: 0.2s;
    }

    .chip:hover {
      background: #f2f2f2;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #fcfcfc;
    }

    .msg {
      max-width: 76%;
      padding: 12px 14px;
      border-radius: 16px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .user {
      align-self: flex-end;
      background: #111;
      color: white;
    }

    .bot {
      align-self: flex-start;
      background: #f1f1f1;
      color: #111;
    }

    #inputBox {
      display: flex;
      border-top: 1px solid #ececec;
      background: #fff;
    }

    input {
      flex: 1;
      padding: 16px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    button {
      border: none;
      background: #111;
      color: white;
      padding: 0 24px;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.92;
    }

    footer {
      text-align: center;
      font-size: 12px;
      padding: 10px;
      border-top: 1px solid #ececec;
      background: #fff;
    }
  </style>
</head>
<body>
  <header>L'ORÉAL • SMART ROUTINE & PRODUCT ADVISOR</header>

  <div class="chips">
    <div class="chip">What's the difference between a serum and a treatment?</div>
    <div class="chip">Build me a routine for oily skin</div>
    <div class="chip">Recommend products for damaged hair</div>
    <div class="chip">Natural makeup look</div>
  </div>

  <div id="chat"></div>

  <div id="inputBox">
    <input id="input" type="text" placeholder="Ask about skincare, haircare, or makeup..." />
    <button id="sendBtn">Send</button>
  </div>

  <footer>© L'Oréal • Privacy • Contact</footer>

  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");

    function addMessage(text, type) {
      const div = document.createElement("div");
      div.className = "msg " + type;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function welcomeMessage() {
      addMessage(
        "Hi! I'm your L'Oréal Smart Routine & Product Advisor ✨\n\nI can help with skincare, haircare, makeup, and simple product recommendations. Try one of the prompt buttons above or ask your own question.",
        "bot"
      );
    }

    function getBotReply(message) {
      const text = message.toLowerCase();

      if (text.includes("serum") && text.includes("treatment")) {
        return "✨ A serum is usually a lightweight, fast-absorbing product used daily to target concerns like dryness, dullness, or uneven tone.\n\n💧 A treatment product is often more targeted and may come in forms like creams, masks, or spot treatments for concerns such as acne, dark spots, or irritation.\n\nIn simple terms: serums are often part of an everyday routine, while treatments are more concern-specific. I can also help you build a routine if you'd like.";
      }

      if (text.includes("oily skin")) {
        return "For oily skin, a simple routine could be:\n\n1. Gentle cleanser\n2. Lightweight serum\n3. Oil-free moisturizer\n4. SPF in the morning\n\nLook for lightweight, non-greasy products and avoid heavy layers. If you want, I can also suggest a morning vs. night routine.";
      }

      if (text.includes("dry skin")) {
        return "For dry skin, focus on hydration and barrier support ✨\n\n1. Gentle hydrating cleanser\n2. Hydrating serum\n3. Rich moisturizer\n4. SPF in the morning\n\nCream-based and nourishing formulas usually work best.";
      }

      if (text.includes("damaged hair") || text.includes("hair damage")) {
        return "For damaged hair, try a routine focused on repair and moisture:\n\n• Gentle shampoo\n• Nourishing conditioner\n• Repair mask 1–2 times a week\n• Leave-in treatment or heat protectant\n\nLook for products that support softness, strength, and reduced breakage.";
      }

      if (text.includes("natural makeup")) {
        return "For a natural makeup look, keep it light and fresh:\n\n• Skin tint or light foundation\n• Concealer where needed\n• Soft blush\n• Mascara\n• Tinted lip product\n\nThe goal is even skin, a little color, and a polished but effortless finish.";
      }

      if (text.includes("acne")) {
        return "For acne-prone skin, keep your routine simple and consistent:\n\n1. Gentle cleanser\n2. Lightweight treatment-focused serum\n3. Non-comedogenic moisturizer\n4. SPF during the day\n\nAvoid overloading your skin with too many harsh products at once.";
      }

      if (text.includes("routine")) {
        return "I’d be happy to help build a routine ✨ Tell me your main concern—like oily skin, dryness, acne, damaged hair, or makeup goals—and I’ll suggest a simple routine.";
      }

      if (text.includes("moisturizer")) {
        return "A moisturizer helps lock in hydration and support the skin barrier. It’s usually one of the final steps in a skincare routine, before SPF in the morning.";
      }

      if (text.includes("cleanser")) {
        return "A cleanser is usually the first step in a skincare routine. It removes dirt, oil, and buildup so the rest of your products can work better.";
      }

      if (text.includes("hello") || text.includes("hi")) {
        return "Hi there ✨ Ask me about skincare, haircare, makeup, or building a routine, and I’ll help you out.";
      }

      return "That’s a great beauty question ✨ Based on what you asked, I’d recommend thinking about your product choice based on your skin type, hair type, or overall goal.\n\nYou can ask me things like:\n• Build me a skincare routine\n• What’s the difference between product types?\n• Recommend products for oily skin or damaged hair\n• Help me create a natural makeup look";
    }

    function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, "user");
      input.value = "";

      const thinking = addMessage("Thinking...", "bot");

      setTimeout(() => {
        thinking.remove();
        const reply = getBotReply(text);
        addMessage(reply, "bot");
      }, 600);
    }

    sendBtn.addEventListener("click", sendMessage);

    input.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        sendMessage();
      }
    });

    document.querySelectorAll(".chip").forEach(chip => {
      chip.addEventListener("click", () => {
        input.value = chip.textContent;
        sendMessage();
      });
    });

    welcomeMessage();
  </script>
</body>
</html>
